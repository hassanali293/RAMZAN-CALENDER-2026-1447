<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karachi Ramadan 2026 - Live Countdown & Siren</title>
    <style>
        :root {
            --primary-green: #1e5631;
            --accent-gold: #f1c40f;
            --danger-red: #c0392b;
            --light-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--light-bg);
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Responsive Container */
        .calendar-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px; /* Mobile Friendly Width */
            border-top: 10px solid var(--primary-green);
        }

        header h1 {
            font-size: 1.3rem;
            color: var(--primary-green);
            text-align: center;
            margin-bottom: 15px;
        }

        /* Status & Clock */
        .status-bar {
            background: #f0f9f1;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #d4ebd5;
        }

        #clock {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .countdown-box {
            font-size: 1rem;
            color: var(--danger-red);
            font-weight: bold;
            margin-top: 8px;
            display: block;
        }

        /* Mobile Responsive Buttons */
        .activation-btn {
            width: 100%;
            padding: 18px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
            animation: pulse 2s infinite;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .dua-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .test-btn {
            background: #555;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        /* Scrollable Table for Mobile */
        .table-container {
            width: 100%;
            overflow-y: auto;
            max-height: 350px; /* Important for mobile height */
            border-radius: 10px;
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--primary-green); color: white; padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #f0f0f0; text-align: center; }

        .today-row { background-color: #fff9c4 !important; font-weight: bold; }
        .highlight-siren { background-color: var(--accent-gold) !important; animation: flash 1s infinite; }

        @keyframes flash { 50% { opacity: 0.5; } }
        @keyframes pulse { 
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .credits {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--primary-green);
        }
    </style>
</head>
<body>

    <div class="calendar-card">
        <header>
            <h1>🌙 Karachi Ramadan 2026</h1>
            <div class="status-bar">
                <div id="clock">00:00:00 AM</div>
                <div id="countdown" class="countdown-box">Loading...</div>
            </div>
        </header>

        <button id="activateBtn" class="activation-btn" onclick="startSirenSystem()">
            🔊 ACTIVATE AUTO-SIREN
        </button>

        <div class="actions">
            <button class="dua-btn" onclick="playDua()">▶ Listen Dua</button>
            <button class="test-btn" onclick="testSiren()">🔔 Test Sound</button>
        </div>

        <div class="table-container">
            <table id="ramadanTable">
                <thead>
                    <tr>
                        <th>Ramadan</th>
                        <th>Sehri</th>
                        <th>Iftar</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <div class="credits">
            Made By: <b>SYED MUHAMMAD HASSAN ALI</b><br>
            Islamic Studio YouTube Channel
        </div>
    </div>

    <audio id="sirenSound" preload="auto">
        <source src="https://www.naataudio.com/downloads/IslamicRingtones/Sehri-Iftar-Alarm.mp3" type="audio/mpeg">
    </audio>
    <audio id="duaAudio" preload="auto">
        <source src="Video.Guru_20260102_152237875.mp3" type="audio/mpeg">
    </audio>

    <script>
        const ramadanData = [
            ["1", "05:46 AM", "06:29 PM", "19 Feb 2026"],
            ["2", "05:45 AM", "06:30 PM", "20 Feb 2026"],
            ["3", "05:44 AM", "06:31 PM", "21 Feb 2026"],
            ["4", "05:44 AM", "06:31 PM", "22 Feb 2026"],
            ["5", "05:43 AM", "06:32 PM", "23 Feb 2026"],
            ["6", "05:42 AM", "06:32 PM", "24 Feb 2026"],
            ["7", "05:41 AM", "06:33 PM", "25 Feb 2026"],
            ["8", "05:40 AM", "06:33 PM", "26 Feb 2026"],
            ["9", "05:40 AM", "06:34 PM", "27 Feb 2026"],
            ["10", "05:39 AM", "06:34 PM", "28 Feb 2026"],
            ["11", "05:38 AM", "06:35 PM", "01 Mar 2026"],
            ["12", "05:37 AM", "06:35 PM", "02 Mar 2026"],
            ["13", "05:36 AM", "06:36 PM", "03 Mar 2026"],
            ["14", "05:35 AM", "06:36 PM", "04 Mar 2026"],
            ["15", "05:34 AM", "06:37 PM", "05 Mar 2026"],
            ["16", "05:33 AM", "06:37 PM", "06 Mar 2026"],
            ["17", "05:32 AM", "06:38 PM", "07 Mar 2026"],
            ["18", "05:31 AM", "06:38 PM", "08 Mar 2026"],
            ["19", "05:30 AM", "06:39 PM", "09 Mar 2026"],
            ["20", "05:30 AM", "06:39 PM", "10 Mar 2026"],
            ["21", "05:29 AM", "06:40 PM", "11 Mar 2026"],
            ["22", "05:28 AM", "06:40 PM", "12 Mar 2026"],
            ["23", "05:27 AM", "06:41 PM", "13 Mar 2026"],
            ["24", "05:25 AM", "06:41 PM", "14 Mar 2026"],
            ["25", "05:24 AM", "06:42 PM", "15 Mar 2026"],
            ["26", "05:23 AM", "06:42 PM", "16 Mar 2026"],
            ["27", "05:22 AM", "06:43 PM", "17 Mar 2026"],
            ["28", "05:21 AM", "06:43 PM", "18 Mar 2026"],
            ["29", "05:20 AM", "06:43 PM", "19 Mar 2026"],
            ["30", "05:19 AM", "06:44 PM", "20 Mar 2026"]
        ];

        let isAudioUnlocked = false;
        let lastPlayedKey = "";

        // Render Table
        const tbody = document.getElementById('tableBody');
        ramadanData.forEach(d => {
            const tr = document.createElement('tr');
            tr.setAttribute('data-date', d[3]);
            tr.innerHTML = `<td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td><td>${d[3].split(' ')[0] + ' ' + d[3].split(' ')[1]}</td>`;
            tbody.appendChild(tr);
        });

        // The "Secret Sauce" for Mobile Audio
        function startSirenSystem() {
            const siren = document.getElementById("sirenSound");
            siren.play().then(() => {
                siren.pause(); // Just a quick play/pause to tell Mobile OS it's allowed
                siren.currentTime = 0;
                isAudioUnlocked = true;
                const btn = document.getElementById("activateBtn");
                btn.innerText = "✅ SIREN SYSTEM ACTIVE";
                btn.style.background = "#1e5631";
                btn.style.animation = "none";
            }).catch(e => alert("Please tap again to allow sound."));
        }

        function testSiren() {
            const siren = document.getElementById("sirenSound");
            siren.currentTime = 0;
            siren.play();
        }

        function playDua() {
            document.getElementById("duaAudio").play();
        }

        function updateApp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).replace(/^0/, '');
            
            document.getElementById("clock").innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const rows = document.querySelectorAll("#ramadanTable tbody tr");
            let targetFound = false;

            rows.forEach(r => {
                const dateAttr = r.getAttribute('data-date');
                const rowDate = new Date(dateAttr);
                const sehriStr = r.cells[1].innerText.trim();
                const iftarStr = r.cells[2].innerText.trim();

                r.classList.remove("today-row", "highlight-siren");

                if (now.toDateString() === rowDate.toDateString()) {
                    r.classList.add("today-row");

                    // SIREN LOGIC
                    if ((timeStr === sehriStr || timeStr === iftarStr)) {
                        r.classList.add("highlight-siren");
                        if (isAudioUnlocked && lastPlayedKey !== timeStr) {
                            document.getElementById("sirenSound").play();
                            lastPlayedKey = timeStr;
                        }
                    }
                }

                // Countdown logic
                const sTime = new Date(`${dateAttr} ${sehriStr}`);
                const iTime = new Date(`${dateAttr} ${iftarStr}`);

                if (!targetFound) {
                    if (now < sTime) {
                        setTimer(sTime, "Next Sehri"); targetFound = true;
                    } else if (now < iTime) {
                        setTimer(iTime, "Today's Iftar"); targetFound = true;
                    }
                }
            });
        }

        function setTimer(target, label) {
            const diff = target - new Date();
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById("countdown").innerText = `${label} in: ${h}h ${m}m ${s}s`;
        }

        setInterval(updateApp, 1000);
    </script>
</body>
</html>
