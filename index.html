<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Siren System</title>

<style>

body{
font-family:Arial;
background:#f4f7f6;
text-align:center;
padding:20px;
}

.card{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.clock{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.countdown{
font-size:18px;
color:red;
margin-bottom:15px;
}

button{
padding:12px 20px;
border:none;
background:#1e5631;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin:5px;
}

button:active{
transform:scale(.95);
}

</style>
</head>

<body onclick="activateSystem()">

<div class="card">

<h2>🌙 Ramadan 2026</h2>
<p>📍 Karachi (Hanafi)</p>

<div class="clock" id="clock"></div>
<div class="countdown" id="countdown">Loading...</div>

<button onclick="testSiren(event)">🔔 Test Siren</button>
<button onclick="playDua(event)">▶ Roza Dua</button>

</div>

<audio id="siren">
<source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

<audio id="dua">
<source src="Video.Guru_20260102_152237875.mp3" type="audio/mpeg">
</audio>

<script>

let active=false
let lastPlay=""

const siren=document.getElementById("siren")
const dua=document.getElementById("dua")

const timetable={

"19 Feb 2026":{sehri:"05:46 AM",iftar:"06:29 PM"},
"20 Feb 2026":{sehri:"05:45 AM",iftar:"06:30 PM"},
"21 Feb 2026":{sehri:"05:44 AM",iftar:"06:31 PM"},
"22 Feb 2026":{sehri:"05:44 AM",iftar:"06:31 PM"},
"23 Feb 2026":{sehri:"05:43 AM",iftar:"06:32 PM"},
"24 Feb 2026":{sehri:"05:42 AM",iftar:"06:32 PM"},
"25 Feb 2026":{sehri:"05:41 AM",iftar:"06:33 PM"},
"26 Feb 2026":{sehri:"05:40 AM",iftar:"06:33 PM"},
"27 Feb 2026":{sehri:"05:40 AM",iftar:"06:34 PM"},
"28 Feb 2026":{sehri:"05:39 AM",iftar:"06:34 PM"},
"01 Mar 2026":{sehri:"05:38 AM",iftar:"06:35 PM"},
"02 Mar 2026":{sehri:"05:37 AM",iftar:"06:35 PM"},
"03 Mar 2026":{sehri:"05:36 AM",iftar:"06:36 PM"},
"04 Mar 2026":{sehri:"05:35 AM",iftar:"06:36 PM"},
"05 Mar 2026":{sehri:"05:34 AM",iftar:"06:37 PM"},
"06 Mar 2026":{sehri:"05:33 AM",iftar:"06:37 PM"},
"07 Mar 2026":{sehri:"05:32 AM",iftar:"06:38 PM"},
"08 Mar 2026":{sehri:"05:31 AM",iftar:"06:38 PM"},
"09 Mar 2026":{sehri:"05:30 AM",iftar:"06:39 PM"},
"10 Mar 2026":{sehri:"05:30 AM",iftar:"06:39 PM"},
"11 Mar 2026":{sehri:"05:29 AM",iftar:"06:40 PM"},
"12 Mar 2026":{sehri:"05:28 AM",iftar:"06:40 PM"},
"13 Mar 2026":{sehri:"05:27 AM",iftar:"06:41 PM"},
"14 Mar 2026":{sehri:"05:25 AM",iftar:"06:41 PM"},
"15 Mar 2026":{sehri:"05:24 AM",iftar:"06:42 PM"},
"16 Mar 2026":{sehri:"05:23 AM",iftar:"06:42 PM"},
"17 Mar 2026":{sehri:"05:22 AM",iftar:"06:43 PM"},
"18 Mar 2026":{sehri:"05:21 AM",iftar:"06:43 PM"},
"19 Mar 2026":{sehri:"05:20 AM",iftar:"06:43 PM"},
"20 Mar 2026":{sehri:"05:19 AM",iftar:"06:44 PM"}

}

function activateSystem(){

if(!active){

siren.play().then(()=>{
siren.pause()
siren.currentTime=0
})

dua.play().then(()=>{
dua.pause()
dua.currentTime=0
})

active=true

}

}

function testSiren(e){

e.stopPropagation()

activateSystem()

siren.currentTime=0
siren.play()

setTimeout(()=>{
siren.pause()
},60000)

}

function playDua(e){

e.stopPropagation()

activateSystem()

if(dua.paused){
dua.play()
}else{
dua.pause()
}

}

function convert(time){

let p=time.split(" ")
let hm=p[0].split(":")

let h=parseInt(hm[0])
let m=parseInt(hm[1])

if(p[1]=="PM" && h!=12) h+=12
if(p[1]=="AM" && h==12) h=0

return {h,m}

}

function update(){

const now=new Date()

document.getElementById("clock").innerText=
now.toLocaleTimeString()

let dateStr=now.toDateString().slice(4)

let today=timetable[dateStr]

if(!today) return

let s=convert(today.sehri)
let i=convert(today.iftar)

if(now.getHours()==s.h && now.getMinutes()==s.m){
play("sehri")
}

if(now.getHours()==i.h && now.getMinutes()==i.m){
play("iftar")
}

let target=new Date()

if(now.getHours()<i.h){
target.setHours(i.h,i.m,0)
showCountdown(target,"Iftar")
}else{
target.setHours(s.h,s.m,0)
target.setDate(target.getDate()+1)
showCountdown(target,"Sehri")
}

}

function showCountdown(target,label){

let diff=target-new Date()

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)
let s=Math.floor((diff%60000)/1000)

document.getElementById("countdown").innerText=
label+" in "+h+"h "+m+"m "+s+"s"

}

function play(key){

let today=new Date().toDateString()

if(lastPlay==today+key) return

if(active){

siren.currentTime=0
siren.play()

setTimeout(()=>{
siren.pause()
},60000)

lastPlay=today+key

}

}

setInterval(update,1000)

</script>

</body>
</html>
