<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karachi Ramadan 2026 - Fixed Siren</title>
    <style>
        :root {
            --primary-green: #1e5631;
            --accent-gold: #f1c40f;
            --danger-red: #c0392b;
            --light-bg: #f4f7f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--light-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .calendar-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            border-top: 10px solid var(--primary-green);
            text-align: center;
        }

        .status-bar {
            background: #f0f9f1;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid #d4ebd5;
        }

        #clock { font-size: 1.8rem; font-weight: 800; color: #333; }
        .countdown-box { color: var(--danger-red); font-weight: bold; margin-top: 5px; }

        .activation-btn {
            width: 100%;
            padding: 18px;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,152,0,0.3);
            animation: pulse 2s infinite;
        }

        .active-state { background: var(--primary-green) !important; animation: none !important; }

        .table-container {
            width: 100%;
            overflow-y: auto;
            max-height: 300px;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--primary-green); color: white; padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #f0f0f0; }

        .today-row { background-color: #fff9c4 !important; font-weight: bold; }
        .highlight-siren { background-color: var(--accent-gold) !important; animation: flash 1s infinite; }

        @keyframes flash { 50% { opacity: 0.5; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="calendar-card">
        <h2>🌙 Karachi Ramadan 2026</h2>
        
        <div class="status-bar">
            <div id="clock">00:00:00 AM</div>
            <div id="countdown" class="countdown-box">System Initializing...</div>
        </div>

        <button id="activateBtn" class="activation-btn" onclick="unlockAudio()">
            🔊 ACTIVATE AUTO-SIREN
        </button>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Roza</th><th>Sehri</th><th>Iftar</th><th>Date</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <audio id="sirenSound" preload="auto">
        <source src="https://www.naataudio.com/downloads/IslamicRingtones/Sehri-Iftar-Alarm.mp3" type="audio/mpeg">
    </audio>

    <script>
        const ramadanData = [
            ["1", "05:46 AM", "06:29 PM", "19 Feb 2026"],
            ["2", "05:45 AM", "06:30 PM", "20 Feb 2026"],
            ["3", "05:44 AM", "06:31 PM", "21 Feb 2026"],
            ["4", "05:44 AM", "06:31 PM", "22 Feb 2026"],
            ["5", "05:43 AM", "06:32 PM", "23 Feb 2026"],
            ["6", "05:42 AM", "06:32 PM", "24 Feb 2026"],
            ["7", "05:41 AM", "06:33 PM", "25 Feb 2026"],
            ["8", "05:40 AM", "06:33 PM", "26 Feb 2026"],
            ["9", "05:40 AM", "06:34 PM", "27 Feb 2026"],
            ["10", "05:39 AM", "06:34 PM", "28 Feb 2026"],
            ["11", "05:38 AM", "06:35 PM", "01 Mar 2026"],
            ["12", "05:37 AM", "06:35 PM", "02 Mar 2026"],
            ["13", "05:36 AM", "06:36 PM", "03 Mar 2026"],
            ["14", "05:35 AM", "06:36 PM", "04 Mar 2026"],
            ["15", "05:34 AM", "06:37 PM", "05 Mar 2026"],
            ["16", "05:33 AM", "06:37 PM", "06 Mar 2026"],
            ["17", "05:32 AM", "06:38 PM", "07 Mar 2026"],
            ["18", "05:31 AM", "06:38 PM", "08 Mar 2026"],
            ["19", "05:30 AM", "06:39 PM", "09 Mar 2026"],
            ["20", "05:30 AM", "06:39 PM", "10 Mar 2026"],
            ["21", "05:29 AM", "06:40 PM", "11 Mar 2026"],
            ["22", "05:28 AM", "06:40 PM", "12 Mar 2026"],
            ["23", "05:27 AM", "06:41 PM", "13 Mar 2026"],
            ["24", "05:25 AM", "06:41 PM", "14 Mar 2026"],
            ["25", "05:24 AM", "06:42 PM", "15 Mar 2026"],
            ["26", "05:23 AM", "06:42 PM", "16 Mar 2026"],
            ["27", "05:22 AM", "06:43 PM", "17 Mar 2026"],
            ["28", "05:21 AM", "06:43 PM", "18 Mar 2026"],
            ["29", "05:20 AM", "06:43 PM", "19 Mar 2026"],
            ["30", "05:19 AM", "06:44 PM", "20 Mar 2026"]
        ];

        let audioContextUnlocked = false;
        let sirenPlayedForMinute = ""; // Prevents siren from playing multiple times in 1 minute

        // Populate Table
        const tbody = document.getElementById('tableBody');
        ramadanData.forEach(d => {
            const tr = document.createElement('tr');
            tr.id = `row-${d[3].replace(/ /g, '')}`;
            tr.innerHTML = `<td>${d[0]}</td><td>${d[1]}</td><td>${d[2]}</td><td>${d[3]}</td>`;
            tbody.appendChild(tr);
        });

        // CRITICAL: Function to unlock audio on mobile
        function unlockAudio() {
            const siren = document.getElementById("sirenSound");
            siren.play().then(() => {
                siren.pause();
                siren.currentTime = 0;
                audioContextUnlocked = true;
                const btn = document.getElementById("activateBtn");
                btn.innerText = "✅ SIREN IS ACTIVE";
                btn.classList.add("active-state");
                alert("Siren system activated! Keep this page open.");
            }).catch(err => {
                console.error("Audio unlock failed:", err);
            });
        }

        function updateClock() {
            const now = new Date();
            
            // Format current time to match "05:46 AM" exactly
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            const currentTimeStr = `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`;

            // Display Digital Clock
            document.getElementById("clock").innerText = now.toLocaleTimeString();

            // Check Today's Data
            const todayStr = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/,/g, '');
            
            let targetTime = null;
            let targetLabel = "";

            ramadanData.forEach(d => {
                const [roza, sehri, iftar, date] = d;
                const row = document.getElementById(`row-${date.replace(/ /g, '')}`);
                
                if (date === todayStr) {
                    row.classList.add("today-row");

                    // SIREN TRIGGER LOGIC
                    if (audioContextUnlocked) {
                        if ((currentTimeStr === sehri || currentTimeStr === iftar) && sirenPlayedForMinute !== currentTimeStr) {
                            document.getElementById("sirenSound").play();
                            sirenPlayedForMinute = currentTimeStr;
                            row.classList.add("highlight-siren");
                        }
                    }

                    // Countdown Logic
                    const sehriTime = new Date(`${date} ${sehri}`);
                    const iftarTime = new Date(`${date} ${iftar}`);

                    if (now < sehriTime) {
                        targetTime = sehriTime;
                        targetLabel = "Sehri";
                    } else if (now < iftarTime) {
                        targetTime = iftarTime;
                        targetLabel = "Iftar";
                    }
                }
            });

            // Update Countdown
            if (targetTime) {
                const diff = targetTime - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById("countdown").innerText = `${targetLabel} in: ${h}h ${m}m ${s}s`;
            } else {
                document.getElementById("countdown").innerText = "Wait for Next Roza";
            }
        }

        setInterval(updateClock, 1000);
    </script>
</body>
</html>
