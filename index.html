<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karachi Ramadan 2026 - Live Countdown & Auto-Siren</title>
    <style>
        :root {
            --primary-green: #1e5631;
            --accent-red: #c0392b;
            --bg-light: #f4f7f6;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(10px, 4vw, 30px);
        }

        .calendar-card {
            background: var(--white);
            width: 100%;
            max-width: 850px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border-top: 10px solid var(--primary-green);
            overflow: hidden;
            padding: clamp(15px, 5vw, 30px);
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--primary-green);
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            margin-bottom: 10px;
        }

        .status-bar {
            background: #eef7f2;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #c8e6c9;
            margin-bottom: 20px;
        }

        #clock {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: 800;
            color: var(--primary-green);
            font-family: 'Courier New', monospace;
            display: block;
        }

        .countdown-box {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--white);
            border: 2px solid var(--accent-red);
            border-radius: 50px;
            color: var(--accent-red);
            font-weight: bold;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
        }

        /* Essential Button Styles */
        .activation-zone {
            margin: 20px 0;
            text-align: center;
        }

        #statusText {
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-red);
        }

        .btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 300px;
        }

        .btn-activate { background: #ff9800; color: white; margin-bottom: 10px; }
        .btn-test { background: var(--accent-red); color: white; }
        .btn-success { background: var(--primary-green) !important; }

        /* Table Styling */
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: var(--primary-green); color: white; padding: 15px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .today-row { background-color: #fff9c4 !important; border: 2px solid var(--primary-green); }
        .siren-active { background-color: #ff5252 !important; color: white !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .credits { margin-top: 20px; font-weight: bold; color: var(--primary-green); text-align: center; }
    </style>
</head>

<body>

    <div class="calendar-card">
        <header>
            <h1>🌙 Karachi Ramadan 2026</h1>
            <div class="status-bar">
                <span id="clock">00:00:00 AM</span>
                <div id="countdown" class="countdown-box">System Initializing...</div>
            </div>
        </header>

        <div class="activation-zone">
            <p id="statusText">⚠️ ACTION REQUIRED: Tap below to enable Siren</p>
            <button id="mainActionBtn" class="btn btn-activate" onclick="enableAudioSystem()">🔊 ACTIVATE SIREN SYSTEM</button>
            <button class="btn btn-test" onclick="playAudio('sirenSound')">🔔 TEST SIREN NOW</button>
        </div>

        <div class="table-wrapper">
            <table id="ramadanTable">
                <thead>
                    <tr>
                        <th>Ramadan</th>
                        <th>Sehri</th>
                        <th>Iftar</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="credits">
            Created by: SYED MUHAMMAD HASSAN ALI
            <p style="font-size: 0.8rem; font-weight: normal;">Islamic Studio Youtube Channel</p>
        </div>
    </div>

    <audio id="sirenSound" preload="auto">
        <source src="https://www.naataudio.com/downloads/IslamicRingtones/Sehri-Iftar-Alarm.mp3" type="audio/mpeg">
    </audio>

    <script>
        const ramadanData = [
            ["1", "05:46 AM", "06:29 PM", "19 Feb 2026"], ["2", "05:45 AM", "06:30 PM", "20 Feb 2026"],
            ["3", "05:44 AM", "06:31 PM", "21 Feb 2026"], ["4", "05:44 AM", "06:31 PM", "22 Feb 2026"],
            ["5", "05:43 AM", "06:32 PM", "23 Feb 2026"], ["6", "05:42 AM", "06:32 PM", "24 Feb 2026"],
            ["7", "05:41 AM", "06:33 PM", "25 Feb 2026"], ["8", "05:40 AM", "06:33 PM", "26 Feb 2026"],
            ["9", "05:40 AM", "06:34 PM", "27 Feb 2026"], ["10", "05:39 AM", "06:34 PM", "28 Feb 2026"],
            ["11", "05:38 AM", "06:35 PM", "01 Mar 2026"], ["12", "05:37 AM", "06:35 PM", "02 Mar 2026"],
            ["13", "05:36 AM", "06:36 PM", "03 Mar 2026"], ["14", "05:35 AM", "06:36 PM", "04 Mar 2026"],
            ["15", "05:34 AM", "06:37 PM", "05 Mar 2026"], ["16", "05:33 AM", "06:37 PM", "06 Mar 2026"],
            ["17", "05:32 AM", "06:38 PM", "07 Mar 2026"], ["18", "05:31 AM", "06:38 PM", "08 Mar 2026"],
            ["19", "05:30 AM", "06:39 PM", "09 Mar 2026"], ["20", "05:30 AM", "06:39 PM", "10 Mar 2026"],
            ["21", "05:29 AM", "06:40 PM", "11 Mar 2026"], ["22", "05:28 AM", "06:40 PM", "12 Mar 2026"],
            ["23", "05:27 AM", "06:41 PM", "13 Mar 2026"], ["24", "05:25 AM", "06:41 PM", "14 Mar 2026"],
            ["25", "05:24 AM", "06:42 PM", "15 Mar 2026"], ["26", "05:23 AM", "06:42 PM", "16 Mar 2026"],
            ["27", "05:22 AM", "06:43 PM", "17 Mar 2026"], ["28", "05:21 AM", "06:43 PM", "18 Mar 2026"],
            ["29", "05:20 AM", "06:43 PM", "19 Mar 2026"], ["30", "05:19 AM", "06:44 PM", "20 Mar 2026"]
        ];

        let audioEnabled = false;
        let lastPlayed = "";

        // Build Table
        const tbody = document.getElementById('tableBody');
        ramadanData.forEach(day => {
            const row = `<tr data-date="${day[3]}">
                <td>${day[0]}</td>
                <td>${day[1]}</td>
                <td>${day[2]}</td>
                <td>${day[3]}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // The Magic Function for All Devices
        function enableAudioSystem() {
            const siren = document.getElementById('sirenSound');
            
            // Play and immediately pause to "unlock" the audio context
            siren.play().then(() => {
                siren.pause();
                siren.currentTime = 0;
                audioEnabled = true;
                
                // Update UI to show success
                const btn = document.getElementById('mainActionBtn');
                btn.innerText = "✅ SIREN SYSTEM ACTIVE";
                btn.className = "btn btn-success";
                document.getElementById('statusText').innerText = "System is monitoring live...";
                document.getElementById('statusText').style.color = "var(--primary-green)";
            }).catch(e => {
                alert("Please click the button again to enable sound.");
            });
        }

        function playAudio(id) {
            const audio = document.getElementById(id);
            audio.currentTime = 0;
            audio.play();
        }

        function updateSystem() {
            const now = new Date();
            const currentTimeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }).replace(/^0/, '');
            
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const rows = document.querySelectorAll('#ramadanTable tbody tr');
            let nextEvent = null;

            rows.forEach(row => {
                const dateStr = row.getAttribute('data-date');
                const sehriStr = row.cells[1].innerText;
                const iftarStr = row.cells[2].innerText;
                const rowDate = new Date(dateStr);
                
                // Highlight today
                if (now.toDateString() === rowDate.toDateString()) {
                    row.classList.add('today-row');
                    
                    // Siren Logic
                    if ((currentTimeStr === sehriStr || currentTimeStr === iftarStr) && audioEnabled && lastPlayed !== currentTimeStr) {
                        row.classList.add('siren-active');
                        playAudio('sirenSound');
                        lastPlayed = currentTimeStr;
                    }
                }

                // Countdown Logic
                const sehriTime = new Date(`${dateStr} ${sehriStr}`);
                const iftarTime = new Date(`${dateStr} ${iftarStr}`);

                if (!nextEvent) {
                    if (now < sehriTime) { nextEvent = { t: sehriTime, l: "Sehri" }; }
                    else if (now < iftarTime) { nextEvent = { t: iftarTime, l: "Iftar" }; }
                }
            });

            if (nextEvent) {
                const diff = nextEvent.t - now;
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('countdown').innerText = `${nextEvent.l} in: ${h}h ${m}m ${s}s`;
            }
        }

        setInterval(updateSystem, 1000);
    </script>
</body>
</html>
